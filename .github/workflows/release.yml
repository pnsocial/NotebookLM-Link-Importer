# Build the extension and attach a ZIP to a GitHub Release when you push a version tag (e.g. v1.0.0).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Verify dist output
        run: test -f dist/manifest.json

      - name: Zip extension (contents of dist/)
        run: |
          cd dist
          zip -r "../NotebookLM-Link-Importer-${GITHUB_REF_NAME}.zip" .
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: NotebookLM-Link-Importer-${{ github.ref_name }}.zip
          generate_release_notes: true
